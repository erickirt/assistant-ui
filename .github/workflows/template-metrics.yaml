name: Template Metrics

on:
  pull_request:
    branches: [main]
    paths:
      - "templates/**"
      - "packages/ui/**"
      - "scripts/template-metrics.mjs"
      - ".github/workflows/template-metrics.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Only these are built for bundle measurement; next build is the expensive part.
  BUNDLE_TEMPLATES: "default minimal"
  # Exceeding MAX_LOC_INCREASE only warns; MAX_LOC_HARD_INCREASE fails the gate.
  MAX_LOC_INCREASE: "50"
  MAX_LOC_HARD_INCREASE: "300"

jobs:
  gate:
    name: Footprint Gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Checkout code repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 24

      # LOC reads tracked sources only; no dependency install needed.
      - name: Compare against merge-base
        run: node scripts/template-metrics.mjs check .

  report:
    name: LOC + Bundle Size
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # ratchet:pnpm/action-setup@v4

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Cache turbo build setup
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build templates (bundle subset)
        env:
          # next build needs these public vars defined; values are placeholders.
          NEXT_PUBLIC_ASSISTANT_BASE_URL: "https://example.com"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          filters=""
          for t in $BUNDLE_TEMPLATES; do
            filters="$filters --filter=./templates/$t"
          done
          # turbo pulls in the @assistant-ui/* workspace deps each template needs.
          pnpm turbo build $filters

      - name: Measure metrics
        run: |
          node scripts/template-metrics.mjs measure . metrics-head.json
          node scripts/template-metrics.mjs measure-base . metrics-base-main.json

      - name: Build report
        run: |
          node scripts/template-metrics.mjs report metrics-base-main.json metrics-head.json metrics-report.md metrics-comment.txt
          cat metrics-report.md

      # continue-on-error: a fork PR's read-only token makes commenting 403; the
      # comment is informational, so that must not fail the job.
      - name: Post / update PR comment
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # ratchet:actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('metrics-report.md', 'utf8');
            const marker = '<!-- template-metrics -->';
            // paginate: a long PR thread can push the sticky comment past the
            // first 30, and missing it would post a duplicate on every re-run.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            const shouldCreate = fs.readFileSync('metrics-comment.txt', 'utf8').trim() === 'post';
            if (!existing && !shouldCreate) {
              console.log('No LOC changes; skipping template metrics comment.');
              return;
            }
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
